<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Coming Soon — Toolzy</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#07080f;--card:#111422;--border:#1c1f35;
  --a1:#00e5ff;--a5:#a78bfa;--a2:#ff3cac;
  --text:#dde2ff;--muted:#4a5070;--muted2:#6a7090;
  --fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--fb);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,229,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,255,.025) 1px,transparent 1px);
  background-size:56px 56px;pointer-events:none;z-index:0;}
.blob{position:fixed;border-radius:50%;filter:blur(130px);pointer-events:none;z-index:0;}
.b1{width:500px;height:500px;background:#00e5ff;opacity:.06;top:-150px;left:-150px;animation:bd 14s ease-in-out infinite alternate;}
.b2{width:400px;height:400px;background:#ff3cac;opacity:.06;bottom:-100px;right:-100px;animation:bd 18s ease-in-out infinite alternate-reverse;}
@keyframes bd{from{transform:translate(0,0) scale(1);}to{transform:translate(40px,30px) scale(1.1);}}

/* NAV */
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;height:62px;background:rgba(7,8,15,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);}
.nav-logo{font-family:var(--fh);font-size:1.3rem;font-weight:800;letter-spacing:-1px;
  background:linear-gradient(120deg,#00e5ff,#a78bfa);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.btn-back{background:transparent;border:1px solid var(--border);color:var(--muted2);
  font-family:var(--fb);font-size:.82rem;padding:8px 18px;border-radius:100px;
  cursor:pointer;text-decoration:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-back:hover{border-color:var(--a1);color:var(--a1);}

/* MAIN */
main{position:relative;z-index:1;min-height:calc(100vh - 62px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 24px;text-align:center;gap:20px;}

/* Animated tool icon */
.tool-icon-wrap{position:relative;width:100px;height:100px;margin-bottom:8px;}
.tool-icon-bg{
  width:100px;height:100px;border-radius:28px;
  background:linear-gradient(135deg,#00e5ff15,#a78bfa15);
  border:1px solid #00e5ff30;
  display:flex;align-items:center;justify-content:center;
  font-size:2.8rem;
  animation:iconpulse 3s ease-in-out infinite;
}
@keyframes iconpulse{0%,100%{box-shadow:0 0 0 0 #00e5ff20;}50%{box-shadow:0 0 0 16px #00e5ff00;}}
.ring-sm{position:absolute;inset:-12px;border-radius:50%;border:1px dashed #00e5ff20;animation:spin 20s linear infinite;}
.ring-sm::after{content:'';position:absolute;top:0;left:50%;width:6px;height:6px;
  background:#00e5ff;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 8px #00e5ff;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* Progress bar */
.progress-wrap{width:100%;max-width:340px;margin-top:4px;}
.progress-label{display:flex;justify-content:space-between;margin-bottom:8px;
  font-family:'DM Sans',sans-serif;font-size:.78rem;color:var(--muted2);}
.progress-bar{height:6px;background:#ffffff08;border-radius:100px;overflow:hidden;}
.progress-fill{height:100%;border-radius:100px;width:0%;
  background:linear-gradient(90deg,var(--a1),var(--a5),var(--a2));
  animation:loadbar 2.5s ease-out forwards;box-shadow:0 0 10px #00e5ff40;}
@keyframes loadbar{0%{width:0%;}60%{width:72%;}80%{width:85%;}100%{width:68%;}}

.cs-title{font-family:var(--fh);font-size:clamp(2rem,7vw,3.2rem);font-weight:800;
  letter-spacing:-2px;line-height:1.1;
  background:linear-gradient(135deg,#00e5ff,#a78bfa,#ff3cac);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.cs-tool{font-family:'Share Tech Mono',monospace;font-size:1rem;color:var(--a1);
  letter-spacing:.08em;margin-bottom:4px;}
.cs-sub{font-size:1rem;color:var(--muted2);max-width:440px;line-height:1.7;font-weight:300;}

/* notify box */
.notify-box{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:20px 24px;max-width:400px;width:100%;margin-top:8px;
}
.notify-label{font-size:.78rem;color:var(--muted2);margin-bottom:10px;}
.notify-form{display:flex;gap:8px;}
.notify-input{flex:1;background:#ffffff06;border:1px solid var(--border);
  border-radius:100px;padding:10px 16px;color:var(--text);font-family:var(--fb);font-size:.85rem;
  outline:none;transition:border-color .2s;}
.notify-input::placeholder{color:var(--muted);}
.notify-input:focus{border-color:#00e5ff40;}
.notify-btn{background:linear-gradient(135deg,#00e5ff,#a78bfa);border:none;
  color:#07080f;font-family:var(--fh);font-size:.8rem;font-weight:700;
  padding:10px 18px;border-radius:100px;cursor:pointer;white-space:nowrap;transition:opacity .2s;}
.notify-btn:hover{opacity:.85;}

/* other tools */
.other-label{font-size:.78rem;color:var(--muted);margin-top:8px;letter-spacing:.06em;text-transform:uppercase;}
.other-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:480px;}
.other-btn{
  background:#ffffff06;border:1px solid var(--border);color:var(--muted2);
  font-family:var(--fb);font-size:.78rem;padding:7px 16px;border-radius:100px;
  text-decoration:none;transition:all .2s;
}
.other-btn:hover{border-color:var(--a1);color:var(--a1);background:#00e5ff08;}

@media(max-width:500px){nav{padding:0 16px;}.notify-form{flex-direction:column;}.notify-btn{border-radius:100px;}}
</style>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>

<nav>
  <a href="index.html" class="btn-back">← Back to Toolzy</a>
  <div class="nav-logo">Toolzy</div>
</nav>

<main>
  <div class="tool-icon-wrap">
    <div class="ring-sm"></div>
    <div class="tool-icon-bg" id="toolIcon">🔧</div>
  </div>

  <div class="cs-tool" id="toolName">THIS TOOL</div>
  <h1 class="cs-title">Coming<br/>Soon</h1>
  <p class="cs-sub">We're working hard on this tool. It'll be live soon — check back later or explore other tools below.</p>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>Building...</span>
      <span id="progressPct">68%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="notify-box">
    <div class="notify-label">Get notified when this tool goes live 🔔</div>
    <div class="notify-form">
      <input class="notify-input" type="email" placeholder="your@email.com" id="notifyEmail"/>
      <button class="notify-btn" onclick="notifyMe()">Notify Me</button>
    </div>
    <div id="notifyMsg" style="font-size:.75rem;color:var(--a4,#43e97b);margin-top:8px;display:none;">✓ You'll be notified!</div>
  </div>

  <div class="other-label">Try these tools in the meantime</div>
  <div class="other-grid" id="otherTools"></div>
</main>

<script>
// Read tool name from URL query ?tool=PDF+Merger
const params = new URLSearchParams(location.search);
const toolName = params.get('tool') || '';
const toolIcon = params.get('icon') || '🔧';

if(toolName){
  document.getElementById('toolName').textContent = toolName.toUpperCase();
  document.title = toolName + ' — Coming Soon — Toolzy';
}
document.getElementById('toolIcon').textContent = toolIcon;

// Animated progress pct
let pct = 0;
const fill = document.getElementById('progressFill');
const pctEl = document.getElementById('progressPct');
const target = 45 + Math.floor(Math.random()*40);
const iv = setInterval(()=>{
  pct = Math.min(target, pct+1);
  pctEl.textContent = pct+'%';
  if(pct>=target) clearInterval(iv);
}, 28);

// Notify
function notifyMe(){
  const v = document.getElementById('notifyEmail').value;
  if(!v||!v.includes('@')) return;
  document.getElementById('notifyMsg').style.display='block';
  document.getElementById('notifyEmail').value='';
}

// Other tools (random 6)
const tools=[
  {name:'Word Counter',href:'tools/text/word-counter.html',icon:'🔢'},
  {name:'BMI Calculator',href:'tools/calculators/bmi.html',icon:'⚖️'},
  {name:'QR Generator',href:'tools/misc/qr-generator.html',icon:'📱'},
  {name:'Live Weather',href:'tools/weather/index.html',icon:'🌤️'},
  {name:'Binary↔Decimal',href:'tools/converters/binary-decimal.html',icon:'🔢'},
  {name:'Lorem Ipsum',href:'tools/text/lorem-ipsum.html',icon:'📄'},
  {name:'Age Calculator',href:'tools/calculators/age.html',icon:'🎂'},
  {name:'Coin Flip',href:'tools/misc/coin-flip.html',icon:'🪙'},
  {name:'Space Shooter',href:'games/space-shooter.html',icon:'🚀'},
  {name:'Snake',href:'games/snake.html',icon:'🐍'},
];
const shuffled = tools.sort(()=>Math.random()-.5).slice(0,6);
document.getElementById('otherTools').innerHTML = shuffled.map(t=>
  `<a class="other-btn" href="${t.href}">${t.icon} ${t.name}</a>`
).join('');
</script>
</body>
</html>
