<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Solar Calendar — Toolzy</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#07080f;--card:#111422;--border:#1c1f35;--a1:#00e5ff;--a5:#a78bfa;--a2:#ff3cac;--a4:#43e97b;--a3:#f5a623;--text:#dde2ff;--muted:#4a5070;--muted2:#6a7090;--fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--fm:'Share Tech Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,166,35,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,166,35,.02) 1px,transparent 1px);background-size:56px 56px;pointer-events:none;z-index:0;}
.blob{position:fixed;border-radius:50%;filter:blur(130px);pointer-events:none;z-index:0;}
.b1{width:600px;height:600px;background:#f5a623;opacity:.07;top:-200px;left:-200px;animation:bd 16s ease-in-out infinite alternate;}
.b2{width:400px;height:400px;background:#ff6b35;opacity:.06;bottom:-100px;right:-100px;animation:bd 20s ease-in-out infinite alternate-reverse;}
@keyframes bd{from{transform:translate(0,0) scale(1);}to{transform:translate(40px,30px) scale(1.1);}}
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:62px;background:rgba(7,8,15,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:var(--fh);font-size:1.3rem;font-weight:800;letter-spacing:-1px;background:linear-gradient(120deg,#f5a623,#ff6b35);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
.btn-back{background:transparent;border:1px solid var(--border);color:var(--muted2);font-family:var(--fb);font-size:.82rem;padding:8px 18px;border-radius:100px;cursor:pointer;text-decoration:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-back:hover{border-color:var(--a3);color:var(--a3);}
main{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:40px 24px 100px;}
.tool-header{text-align:center;margin-bottom:36px;}
.tool-icon{font-size:3rem;margin-bottom:12px;display:block;animation:spin 20s linear infinite;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.tool-title{font-family:var(--fh);font-size:2rem;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#f5a623,#ff6b35);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.tool-sub{color:var(--muted2);font-size:.9rem;margin-top:6px;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.cal-nav-btn{background:#ffffff06;border:1px solid var(--border);color:var(--text);padding:8px 20px;border-radius:100px;cursor:pointer;font-family:var(--fb);transition:all .2s;font-size:.85rem;}
.cal-nav-btn:hover{border-color:var(--a3);color:var(--a3);}
.cal-month{font-family:var(--fh);font-size:1.4rem;font-weight:800;letter-spacing:-1px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:16px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-day-head{text-align:center;font-size:.72rem;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;padding:8px 0;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:.88rem;cursor:pointer;transition:all .2s;position:relative;flex-direction:column;gap:2px;}
.cal-day:hover{background:#ffffff08;}
.cal-day.today{background:linear-gradient(135deg,#f5a62325,#ff6b3525);border:1px solid #f5a62340;}
.cal-day.today .day-num{color:#f5a623;font-weight:700;}
.cal-day.other-month{opacity:.25;}
.cal-day.selected{background:linear-gradient(135deg,#f5a623,#ff6b35);color:#07080f;}
.cal-day.selected .day-num{color:#07080f;font-weight:700;}
.cal-day.weekend .day-num{color:#ff6b35;}
.cal-day.holiday::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#ff3cac;}
.day-num{font-size:.88rem;}
.day-event{width:4px;height:4px;border-radius:50%;background:#43e97b;}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:16px;}
.info-card{background:#ffffff04;border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;}
.info-val{font-family:var(--fm);font-size:1.2rem;color:var(--a3);margin-bottom:4px;}
.info-label{font-size:.72rem;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;}
.selected-info{background:linear-gradient(135deg,#f5a62308,#ff6b3508);border:1px solid #f5a62320;border-radius:14px;padding:18px;margin-bottom:16px;}
.selected-date{font-family:var(--fh);font-size:1.3rem;font-weight:800;color:#f5a623;margin-bottom:8px;}
.selected-details{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sel-detail{font-size:.8rem;color:var(--muted2);}
.sel-detail strong{color:var(--text);display:block;}
.events-list{display:flex;flex-direction:column;gap:8px;}
.event-item{display:flex;gap:10px;align-items:flex-start;padding:10px 14px;background:#ffffff04;border-radius:10px;border-left:3px solid #f5a623;}
.event-date{font-family:var(--fm);font-size:.72rem;color:var(--muted2);white-space:nowrap;margin-top:2px;}
.event-name{font-size:.82rem;color:var(--text);}
.event-type{font-size:.68rem;color:var(--a3);}
</style>
</head>
<body>
<div class="blob b1"></div><div class="blob b2"></div>
<nav>
  <a href="../../index.html" class="btn-back">← Back to Toolzy</a>
  <a href="../../index.html" class="nav-logo">Toolzy</a>
</nav>
<main>
  <div class="tool-header">
    <span class="tool-icon">☀️</span>
    <div class="tool-title">Solar Calendar</div>
    <div class="tool-sub">Gregorian calendar with solar events, Indian holidays & more</div>
  </div>
  <div class="info-grid" id="infoGrid"></div>
  <div class="card">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">‹ Prev</button>
      <div class="cal-month" id="calMonth"></div>
      <button class="cal-nav-btn" onclick="changeMonth(1)">Next ›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
  <div class="selected-info" id="selectedInfo" style="display:none">
    <div class="selected-date" id="selectedDate"></div>
    <div class="selected-details" id="selectedDetails"></div>
  </div>
  <div class="card">
    <div style="font-family:var(--fh);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2);margin-bottom:14px;">📅 Upcoming Events This Month</div>
    <div class="events-list" id="eventsList"></div>
  </div>
</main>
<script>
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const SEASONS=['Winter','Winter','Spring','Spring','Spring','Summer','Summer','Summer','Autumn','Autumn','Autumn','Winter'];
const SOLAR_EVENTS={
  '3-20':'Spring Equinox','6-21':'Summer Solstice','9-22':'Autumn Equinox','12-21':'Winter Solstice',
  '2-14':'Valentine\'s Day','10-31':'Halloween','1-1':'New Year\'s Day','12-25':'Christmas',
  '1-26':'Republic Day 🇮🇳','8-15':'Independence Day 🇮🇳','10-2':'Gandhi Jayanti 🇮🇳',
  '11-14':'Children\'s Day 🇮🇳','9-5':'Teachers\' Day 🇮🇳'
};

let cur=new Date(), selectedDay=null;
cur.setDate(1);

function getEvent(m,d){return SOLAR_EVENTS[`${m}-${d}`]||null;}
function isToday(y,m,d){const t=new Date();return t.getFullYear()===y&&t.getMonth()===m&&t.getDate()===d;}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function dayOfYear(d){return Math.floor((d-new Date(d.getFullYear(),0,0))/(1000*60*60*24));}

function updateInfo(){
  const now=new Date();
  const doy=dayOfYear(now);
  const daysLeft=365-(isLeapYear(now.getFullYear())?366:365)+365-doy+1;
  document.getElementById('infoGrid').innerHTML=`
    <div class="info-card"><div class="info-val">${now.getDate()} ${MONTHS[now.getMonth()].slice(0,3)}</div><div class="info-label">Today</div></div>
    <div class="info-card"><div class="info-val">${now.getFullYear()}</div><div class="info-label">Year</div></div>
    <div class="info-card"><div class="info-val">Day ${doy}</div><div class="info-label">Day of Year</div></div>
    <div class="info-card"><div class="info-val">${365-doy+1}</div><div class="info-label">Days Left</div></div>
    <div class="info-card"><div class="info-val">${SEASONS[now.getMonth()]}</div><div class="info-label">Season</div></div>
    <div class="info-card"><div class="info-val">${isLeapYear(now.getFullYear())?'Yes':'No'}</div><div class="info-label">Leap Year</div></div>
  `;
}

function isLeapYear(y){return (y%4===0&&y%100!==0)||y%400===0;}

function renderCalendar(){
  const y=cur.getFullYear(), m=cur.getMonth();
  document.getElementById('calMonth').textContent=`${MONTHS[m]} ${y}`;
  const firstDay=new Date(y,m,1).getDay();
  const total=daysInMonth(y,m);
  const prevTotal=daysInMonth(y,m-1);
  let html=DAYS.map(d=>`<div class="cal-day-head">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++){
    const d=prevTotal-firstDay+i+1;
    html+=`<div class="cal-day other-month"><span class="day-num">${d}</span></div>`;
  }
  for(let d=1;d<=total;d++){
    const ev=getEvent(m+1,d);
    const today=isToday(y,m,d);
    const weekend=new Date(y,m,d).getDay()===0||new Date(y,m,d).getDay()===6;
    const sel=selectedDay&&selectedDay.y===y&&selectedDay.m===m&&selectedDay.d===d;
    const cls=['cal-day',today?'today':'',weekend?'weekend':'',ev?'holiday':'',sel?'selected':''].filter(Boolean).join(' ');
    html+=`<div class="${cls}" onclick="selectDay(${y},${m},${d})">
      <span class="day-num">${d}</span>
      ${ev?'<div class="day-event"></div>':''}
    </div>`;
  }
  const remaining=(7-((firstDay+total)%7))%7;
  for(let i=1;i<=remaining;i++) html+=`<div class="cal-day other-month"><span class="day-num">${i}</span></div>`;
  document.getElementById('calGrid').innerHTML=html;
  renderEvents(y,m);
}

function selectDay(y,m,d){
  selectedDay={y,m,d};
  renderCalendar();
  const date=new Date(y,m,d);
  const ev=getEvent(m+1,d);
  const doy=dayOfYear(date);
  const week=Math.ceil((doy+new Date(y,0,1).getDay())/7);
  document.getElementById('selectedInfo').style.display='block';
  document.getElementById('selectedDate').textContent=`${DAYS[date.getDay()]}, ${d} ${MONTHS[m]} ${y}`;
  document.getElementById('selectedDetails').innerHTML=`
    <div class="sel-detail"><strong>Day of Year</strong>${doy}</div>
    <div class="sel-detail"><strong>Week Number</strong>Week ${week}</div>
    <div class="sel-detail"><strong>Season</strong>${SEASONS[m]}</div>
    <div class="sel-detail"><strong>Event</strong>${ev||'—'}</div>
  `;
}

function renderEvents(y,m){
  const total=daysInMonth(y,m);
  const evs=[];
  for(let d=1;d<=total;d++){
    const ev=getEvent(m+1,d);
    if(ev) evs.push({d,ev});
  }
  if(evs.length===0){
    document.getElementById('eventsList').innerHTML=`<div style="color:var(--muted2);font-size:.82rem;">No special events this month.</div>`;
    return;
  }
  document.getElementById('eventsList').innerHTML=evs.map(e=>`
    <div class="event-item">
      <div class="event-date">${String(e.d).padStart(2,'0')} ${MONTHS[m].slice(0,3)}</div>
      <div><div class="event-name">${e.ev}</div><div class="event-type">Solar / National Holiday</div></div>
    </div>`).join('');
}

function changeMonth(dir){cur.setMonth(cur.getMonth()+dir);renderCalendar();}
updateInfo();
renderCalendar();
</script>
</body>
</html>
