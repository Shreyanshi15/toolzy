<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Live Weather — Toolzy</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07080f;--card:#111422;--card-h:#161929;--border:#1c1f35;
  --a1:#00e5ff;--a2:#ff3cac;--a3:#f5a623;--a4:#43e97b;--a5:#a78bfa;
  --text:#dde2ff;--muted:#4a5070;--muted2:#6a7090;
  --fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,229,255,.025) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,229,255,.025) 1px,transparent 1px);
  background-size:56px 56px;pointer-events:none;z-index:0;}
.blob{position:fixed;border-radius:50%;filter:blur(130px);pointer-events:none;z-index:0;}
.b1{width:600px;height:600px;background:#00e5ff;opacity:.07;top:-200px;left:-200px;animation:bd 16s ease-in-out infinite alternate;}
.b2{width:500px;height:500px;background:#a78bfa;opacity:.06;bottom:-150px;right:-150px;animation:bd 20s ease-in-out infinite alternate-reverse;}
@keyframes bd{from{transform:translate(0,0)scale(1);}to{transform:translate(40px,30px)scale(1.1);}}

/* NAV */
nav{position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;height:62px;background:rgba(7,8,15,.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);}
.nav-logo{font-family:var(--fh);font-size:1.3rem;font-weight:800;letter-spacing:-1px;
  background:linear-gradient(120deg,#00e5ff,#a78bfa 50%,#ff3cac);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  text-decoration:none;}
.nav-back{background:transparent;border:1px solid var(--border);color:var(--muted2);
  font-family:var(--fb);font-size:.8rem;padding:6px 14px;border-radius:100px;
  cursor:pointer;transition:all .2s;text-decoration:none;display:flex;align-items:center;gap:5px;}
.nav-back:hover{border-color:var(--a1);color:var(--text);}
.api-badge{font-size:.68rem;color:var(--a4);background:#43e97b10;
  border:1px solid #43e97b30;padding:3px 10px;border-radius:100px;}

/* MAIN */
main{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:32px 20px 80px;}

/* SEARCH */
.search-box{display:flex;gap:10px;margin-bottom:32px;}
.search-box input{flex:1;padding:13px 20px;background:var(--card);
  border:1px solid var(--border);border-radius:100px;color:var(--text);
  font-family:var(--fb);font-size:.9rem;outline:none;transition:border-color .25s,box-shadow .25s;}
.search-box input:focus{border-color:#00e5ff40;box-shadow:0 0 0 3px #00e5ff12;}
.search-box input::placeholder{color:var(--muted);}
.btn-search{background:linear-gradient(135deg,#00e5ff,#a78bfa);border:none;color:#07080f;
  font-family:var(--fb);font-weight:700;font-size:.88rem;padding:13px 24px;
  border-radius:100px;cursor:pointer;transition:opacity .2s;white-space:nowrap;}
.btn-search:hover{opacity:.85;}
.btn-locate{background:var(--card);border:1px solid var(--border);color:var(--muted2);
  font-family:var(--fb);font-size:.82rem;padding:13px 18px;border-radius:100px;
  cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn-locate:hover{border-color:var(--a4);color:var(--a4);}

/* UNIT TOGGLE */
.unit-toggle{display:flex;gap:0;background:var(--card);border:1px solid var(--border);
  border-radius:100px;overflow:hidden;margin-bottom:24px;width:fit-content;}
.unit-btn{padding:7px 20px;border:none;background:transparent;color:var(--muted2);
  font-family:var(--fb);font-size:.82rem;cursor:pointer;transition:all .2s;}
.unit-btn.active{background:linear-gradient(135deg,#00e5ff,#a78bfa);color:#07080f;font-weight:700;}

/* MAIN WEATHER CARD */
.weather-main{background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:32px;margin-bottom:16px;position:relative;overflow:hidden;animation:fadeUp .4s ease;}
.weather-main::before{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 80% 20%,#00e5ff08,transparent 60%);pointer-events:none;}
.city-name{font-family:var(--fh);font-size:1.8rem;font-weight:800;color:var(--text);margin-bottom:4px;}
.city-sub{font-size:.82rem;color:var(--muted2);margin-bottom:24px;}
.temp-row{display:flex;align-items:flex-end;gap:20px;margin-bottom:20px;flex-wrap:wrap;}
.temp-big{font-family:var(--fh);font-size:5rem;font-weight:800;letter-spacing:-3px;
  background:linear-gradient(135deg,#00e5ff,#a78bfa);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1;}
.temp-feel{font-size:.82rem;color:var(--muted2);padding-bottom:14px;}
.weather-desc{font-size:1.1rem;color:var(--text);font-weight:500;text-transform:capitalize;margin-bottom:24px;}
.weather-icon-big{font-size:4rem;position:absolute;top:28px;right:32px;opacity:.9;}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:14px 16px;animation:fadeUp .4s ease;}
.stat-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.stat-val{font-family:var(--fh);font-size:1.3rem;font-weight:700;color:var(--text);}
.stat-unit{font-size:.72rem;color:var(--muted2);}

/* FORECAST */
.forecast-title{font-family:var(--fh);font-size:.78rem;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted2);margin-bottom:14px;margin-top:8px;}
.forecast-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-bottom:16px;}
.fc-card{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:14px 12px;text-align:center;animation:fadeUp .4s ease;transition:all .2s;}
.fc-card:hover{border-color:#00e5ff40;transform:translateY(-3px);}
.fc-day{font-size:.72rem;color:var(--muted2);margin-bottom:6px;font-weight:500;}
.fc-icon{font-size:1.6rem;margin-bottom:6px;}
.fc-hi{font-family:var(--fh);font-size:1rem;font-weight:700;color:var(--text);}
.fc-lo{font-size:.75rem;color:var(--muted2);}
.fc-rain{font-size:.65rem;color:#00e5ff;margin-top:4px;}

/* HOURLY */
.hourly-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;}
.hourly-scroll::-webkit-scrollbar{height:4px;}
.hourly-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.hr-card{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:12px 14px;text-align:center;flex-shrink:0;min-width:80px;animation:fadeUp .4s ease;transition:all .2s;}
.hr-card:hover{border-color:#a78bfa40;}
.hr-time{font-size:.68rem;color:var(--muted2);margin-bottom:5px;}
.hr-icon{font-size:1.4rem;margin-bottom:5px;}
.hr-temp{font-family:var(--fh);font-size:.95rem;font-weight:700;color:var(--text);}

/* ERROR / LOADING */
.msg-box{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:40px;text-align:center;animation:fadeUp .3s ease;}
.msg-icon{font-size:2.5rem;margin-bottom:12px;}
.msg-txt{color:var(--muted2);font-size:.88rem;line-height:1.6;}
.spinner{width:32px;height:32px;border:3px solid var(--border);
  border-top-color:var(--a1);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* API INFO */
.api-info{background:#43e97b08;border:1px solid #43e97b20;border-radius:12px;
  padding:12px 16px;margin-bottom:20px;font-size:.75rem;color:#43e97b;line-height:1.7;}
.api-info strong{color:#43e97b;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:600px){
  nav{padding:0 16px;}
  main{padding:20px 14px 60px;}
  .temp-big{font-size:3.5rem;}
  .weather-icon-big{font-size:2.5rem;top:20px;right:16px;}
  .city-name{font-size:1.3rem;}
}
</style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>

<nav>
  <a class="nav-logo" href="../../index.html">Toolzy</a>
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="api-badge">✅ Open-Meteo API + Geocoding API</span>
    <a class="nav-back" href="../../index.html">← Back</a>
  </div>
</nav>

<main>

 
  <!-- Search -->
  <div class="search-box">
    <input type="text" id="cityInput" placeholder="Search city… Mumbai, Delhi, London, New York…"
      onkeydown="if(event.key==='Enter') searchCity()"/>
    <button class="btn-search" onclick="searchCity()">🔍 Search</button>
    <button class="btn-locate" onclick="getLocation()">📍 My Location</button>
  </div>

  <!-- Unit toggle -->
  <div class="unit-toggle">
    <button class="unit-btn active" id="btn-c" onclick="setUnit('c')">°C Celsius</button>
    <button class="unit-btn" id="btn-f" onclick="setUnit('f')">°F Fahrenheit</button>
  </div>

  <!-- Weather output -->
  <div id="output">
    <div class="msg-box">
      <div class="msg-icon">🌤️</div>
      <div style="font-family:'Syne',sans-serif;font-size:1.1rem;color:var(--text);margin-bottom:8px;">Live Weather</div>
      <div class="msg-txt">Search any city or use your current location<br/>to get real-time weather data.</div>
    </div>
  </div>

</main>

<script>
/* =============================================
   ✅ COLLEGE TERM: Global state variables
   ============================================= */
let currentUnit = 'c';
let currentData = null; // stores last fetched data

/* ✅ COLLEGE TERM: Async/Await + Fetch API */
async function searchCity(){
  const city = document.getElementById('cityInput').value.trim();
  if(!city){ showError('Please enter a city name!'); return; }
  showLoading();
  try{
    // ✅ COLLEGE TERM: REST API call — Geocoding API
    const geoRes = await fetch(
      `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`
    );
    // ✅ COLLEGE TERM: JSON parsing
    const geoData = await geoRes.json();
    if(!geoData.results || geoData.results.length===0){
      showError('City not found! Try another city name.');
      return;
    }
    const loc = geoData.results[0];
    await fetchWeather(loc.latitude, loc.longitude, loc.name, loc.country, loc.admin1||'');
  }catch(e){
    showError('Network error! Please check your connection.');
  }
}

/* ✅ COLLEGE TERM: Geolocation API */
function getLocation(){
  if(!navigator.geolocation){ showError('Geolocation not supported by your browser.'); return; }
  showLoading('Getting your location...');
  navigator.geolocation.getCurrentPosition(
    async pos => {
      try{
        const {latitude, longitude} = pos.coords;
        // ✅ Reverse geocoding
        const res = await fetch(
          `https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`
        );
        const data = await res.json();
        const city    = data.address.city || data.address.town || data.address.village || 'Your Location';
        const country = data.address.country_code?.toUpperCase() || '';
        const state   = data.address.state || '';
        await fetchWeather(latitude, longitude, city, country, state);
      }catch(e){
        showError('Could not fetch location details.');
      }
    },
    () => showError('Location access denied. Please search manually.')
  );
}

/* ✅ COLLEGE TERM: Open-Meteo REST API — Main weather fetch */
async function fetchWeather(lat, lon, city, country, state){
  try{
    // ✅ COLLEGE TERM: API endpoint with query parameters
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
      + `&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,wind_direction_10m,uv_index,surface_pressure`
      + `&hourly=temperature_2m,weather_code,precipitation_probability&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,sunrise,sunset`
      + `&timezone=auto&forecast_days=7`;

    const res  = await fetch(url);
    const data = await res.json(); // ✅ JSON response parsing

    currentData = { data, city, country, state, lat, lon };
    renderWeather(currentData);
  }catch(e){
    showError('Failed to fetch weather data. Try again.');
  }
}

/* ✅ COLLEGE TERM: DOM Manipulation — render weather UI */
function renderWeather({data, city, country, state}){
  const c    = data.current;
  const d    = data.daily;
  const h    = data.hourly;
  const isCel = currentUnit === 'c';

  const conv = t => isCel ? t : Math.round(t * 9/5 + 32);
  const unit = isCel ? '°C' : '°F';

  const icon = getIcon(c.weather_code);
  const desc = getDesc(c.weather_code);

  // ✅ COLLEGE TERM: innerHTML DOM update
  document.getElementById('output').innerHTML = `

    <!-- MAIN CARD -->
    <div class="weather-main">
      <div class="weather-icon-big">${icon}</div>
      <div class="city-name">${city}</div>
      <div class="city-sub">${state ? state+', ' : ''}${country} &nbsp;·&nbsp; Lat: ${data.latitude.toFixed(2)}, Lon: ${data.longitude.toFixed(2)}</div>
      <div class="temp-row">
        <div class="temp-big">${conv(Math.round(c.temperature_2m))}${unit}</div>
        <div class="temp-feel">Feels like ${conv(Math.round(c.apparent_temperature))}${unit}</div>
      </div>
      <div class="weather-desc">${icon} ${desc}</div>
      <div style="font-size:.75rem;color:var(--muted2);">
        Sunrise: ${formatTime(d.sunrise[0])} &nbsp;·&nbsp; Sunset: ${formatTime(d.sunset[0])}
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-grid">
      ${statCard('💧 Humidity',    c.relative_humidity_2m, '%')}
      ${statCard('🌬️ Wind',        Math.round(c.wind_speed_10m), 'km/h')}
      ${statCard('🌧️ Rain',        c.precipitation, 'mm')}
      ${statCard('☀️ UV Index',    c.uv_index, '')}
      ${statCard('🔵 Pressure',   Math.round(c.surface_pressure), 'hPa')}
      ${statCard('🌡️ Max',        conv(Math.round(d.temperature_2m_max[0])), unit)}
      ${statCard('🌡️ Min',        conv(Math.round(d.temperature_2m_min[0])), unit)}
      ${statCard('🌧️ Rain Prob',  d.precipitation_probability_max[0], '%')}
    </div>

    <!-- HOURLY -->
    <div class="forecast-title">⏰ Hourly Forecast (Next 24hrs)</div>
    <div class="hourly-scroll">
      ${buildHourly(h, conv, unit)}
    </div>

    <!-- 7 DAY FORECAST -->
    <div class="forecast-title">📅 7-Day Forecast</div>
    <div class="forecast-grid">
      ${buildForecast(d, conv, unit)}
    </div>

    <!-- API CREDIT -->
    <div style="font-size:.7rem;color:var(--muted);text-align:center;margin-top:8px;">
      ✅ Data from <strong style="color:#43e97b">Open-Meteo API</strong> (free, no API key) 
      + <strong style="color:#43e97b">OpenStreetMap Nominatim</strong> for geocoding
    </div>
  `;
}

function statCard(label, val, unit){
  return `<div class="stat-card">
    <div class="stat-label">${label}</div>
    <div class="stat-val">${val}<span class="stat-unit"> ${unit}</span></div>
  </div>`;
}

function buildHourly(h, conv, unit){
  const now = new Date().getHours();
  let html = '';
  for(let i = now; i < now + 24 && i < h.time.length; i++){
    const t = new Date(h.time[i]);
    html += `<div class="hr-card">
      <div class="hr-time">${t.getHours().toString().padStart(2,'0')}:00</div>
      <div class="hr-icon">${getIcon(h.weather_code[i])}</div>
      <div class="hr-temp">${conv(Math.round(h.temperature_2m[i]))}${unit}</div>
    </div>`;
  }
  return html;
}

function buildForecast(d, conv, unit){
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html = '';
  for(let i = 0; i < 7; i++){
    const date = new Date(d.time[i]);
    const isToday = i === 0;
    html += `<div class="fc-card">
      <div class="fc-day" style="color:${isToday?'#00e5ff':'var(--muted2)'}">${isToday?'Today':days[date.getDay()]}</div>
      <div class="fc-icon">${getIcon(d.weather_code[i])}</div>
      <div class="fc-hi">${conv(Math.round(d.temperature_2m_max[i]))}${unit}</div>
      <div class="fc-lo">${conv(Math.round(d.temperature_2m_min[i]))}${unit}</div>
      <div class="fc-rain">💧 ${d.precipitation_probability_max[i]}%</div>
    </div>`;
  }
  return html;
}

function setUnit(u){
  currentUnit = u;
  document.getElementById('btn-c').classList.toggle('active', u==='c');
  document.getElementById('btn-f').classList.toggle('active', u==='f');
  if(currentData) renderWeather(currentData);
}

function showLoading(msg='Fetching weather data...'){
  document.getElementById('output').innerHTML = `
    <div class="msg-box">
      <div class="spinner"></div>
      <div style="font-family:'Syne',sans-serif;color:var(--text);margin-bottom:6px;">Loading</div>
      <div class="msg-txt">${msg}</div>
    </div>`;
}

function showError(msg){
  document.getElementById('output').innerHTML = `
    <div class="msg-box">
      <div class="msg-icon">⚠️</div>
      <div style="font-family:'Syne',sans-serif;color:var(--text);margin-bottom:8px;">Oops!</div>
      <div class="msg-txt">${msg}</div>
    </div>`;
}

function formatTime(iso){
  if(!iso) return '--';
  const d = new Date(iso);
  return d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
}

/* ✅ COLLEGE TERM: WMO Weather Code mapping */
function getIcon(code){
  if(code===0)            return '☀️';
  if(code<=2)             return '🌤️';
  if(code===3)            return '☁️';
  if(code<=49)            return '🌫️';
  if(code<=59)            return '🌦️';
  if(code<=69)            return '🌧️';
  if(code<=79)            return '🌨️';
  if(code<=84)            return '🌧️';
  if(code<=94)            return '⛈️';
  return '🌩️';
}

function getDesc(code){
  if(code===0)  return 'Clear Sky';
  if(code===1)  return 'Mainly Clear';
  if(code===2)  return 'Partly Cloudy';
  if(code===3)  return 'Overcast';
  if(code<=45)  return 'Foggy';
  if(code<=49)  return 'Depositing Rime Fog';
  if(code<=55)  return 'Drizzle';
  if(code<=59)  return 'Freezing Drizzle';
  if(code<=65)  return 'Rain';
  if(code<=69)  return 'Freezing Rain';
  if(code<=75)  return 'Snowfall';
  if(code<=77)  return 'Snow Grains';
  if(code<=82)  return 'Rain Showers';
  if(code<=86)  return 'Snow Showers';
  if(code<=95)  return 'Thunderstorm';
  return 'Thunderstorm with Hail';
}

/* Auto-load with a default city */
window.onload = () => {
  document.getElementById('cityInput').value = 'New Delhi';
  searchCity();
};
</script>
</body>
</html>
