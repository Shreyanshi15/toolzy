<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Timer & Stopwatch — Toolzy</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#07080f;--card:#111422;--border:#1c1f35;--a1:#00e5ff;--a5:#a78bfa;--a2:#ff3cac;--a4:#43e97b;--a3:#f5a623;--text:#dde2ff;--muted:#4a5070;--muted2:#6a7090;--fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--fm:'Share Tech Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.025) 1px,transparent 1px);background-size:56px 56px;pointer-events:none;z-index:0;}
.blob{position:fixed;border-radius:50%;filter:blur(130px);pointer-events:none;z-index:0;}
.b1{width:500px;height:500px;background:#43e97b;opacity:.05;top:-150px;left:-150px;animation:bd 14s ease-in-out infinite alternate;}
.b2{width:400px;height:400px;background:#00e5ff;opacity:.05;bottom:-100px;right:-100px;animation:bd 18s ease-in-out infinite alternate-reverse;}
@keyframes bd{from{transform:translate(0,0) scale(1);}to{transform:translate(40px,30px) scale(1.1);}}
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:62px;background:rgba(7,8,15,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:var(--fh);font-size:1.3rem;font-weight:800;letter-spacing:-1px;background:linear-gradient(120deg,#00e5ff,#a78bfa);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
.btn-back{background:transparent;border:1px solid var(--border);color:var(--muted2);font-family:var(--fb);font-size:.82rem;padding:8px 18px;border-radius:100px;cursor:pointer;text-decoration:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-back:hover{border-color:var(--a1);color:var(--a1);}
main{position:relative;z-index:1;max-width:620px;margin:0 auto;padding:32px 24px 100px;}
.tabs{display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:100px;padding:4px;margin-bottom:28px;}
.tab{flex:1;padding:10px;border-radius:100px;border:none;background:transparent;color:var(--muted2);font-family:var(--fh);font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s;}
.tab.active{background:linear-gradient(135deg,#00e5ff,#a78bfa);color:#07080f;}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:16px;}
.display-wrap{text-align:center;padding:20px 0 28px;}
.svg-ring{display:block;margin:0 auto 20px;}
.time-display{font-family:var(--fm);font-size:clamp(2.8rem,10vw,4.5rem);letter-spacing:.04em;text-align:center;background:linear-gradient(135deg,#00e5ff,#a78bfa);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.ms-display{font-family:var(--fm);font-size:1.2rem;color:var(--muted2);text-align:center;margin-top:4px;}
.controls{display:flex;gap:10px;justify-content:center;margin-top:20px;}
.btn-ctrl{padding:12px 28px;border-radius:100px;border:none;font-family:var(--fh);font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-start{background:linear-gradient(135deg,#43e97b,#00e5ff);color:#07080f;}
.btn-stop{background:linear-gradient(135deg,#ff3cac,#ff6b35);color:#fff;}
.btn-reset{background:#ffffff08;border:1px solid var(--border);color:var(--muted2);}
.btn-reset:hover{border-color:var(--a1);color:var(--a1);}
.btn-lap{background:#a78bfa20;border:1px solid #a78bfa40;color:var(--a5);}
.btn-lap:hover{background:#a78bfa35;}
/* Timer inputs */
.timer-inputs{display:flex;gap:8px;justify-content:center;align-items:center;margin-bottom:20px;}
.time-field{text-align:center;}
.time-field input{width:72px;background:#ffffff06;border:1px solid var(--border);border-radius:12px;padding:12px 8px;color:var(--text);font-family:var(--fm);font-size:1.6rem;text-align:center;outline:none;transition:border-color .2s;}
.time-field input:focus{border-color:#00e5ff40;}
.time-field label{display:block;font-size:.68rem;color:var(--muted2);margin-top:4px;text-transform:uppercase;letter-spacing:.06em;}
.time-sep{font-family:var(--fm);font-size:2rem;color:var(--muted);margin-bottom:18px;}
.presets{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:20px;}
.preset-btn{background:#ffffff04;border:1px solid var(--border);border-radius:100px;padding:6px 14px;font-size:.75rem;color:var(--muted2);cursor:pointer;transition:all .2s;}
.preset-btn:hover{border-color:var(--a1);color:var(--a1);}
/* Progress ring */
.progress-ring{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:#ffffff08;stroke-width:8;}
.ring-prog{fill:none;stroke:url(#ringGrad);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .5s;}
/* Laps */
.laps-list{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
.laps-list::-webkit-scrollbar{width:4px;}
.laps-list::-webkit-scrollbar-track{background:#ffffff05;}
.laps-list::-webkit-scrollbar-thumb{background:#a78bfa40;border-radius:2px;}
.lap-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#ffffff04;border-radius:8px;font-family:var(--fm);font-size:.8rem;}
.lap-num{color:var(--muted2);}
.lap-time{color:var(--text);}
.lap-delta{font-size:.72rem;color:var(--muted);}
.sec-title{font-family:var(--fh);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2);margin-bottom:12px;}
.alert-msg{text-align:center;font-size:1.1rem;padding:12px;background:#43e97b10;border:1px solid #43e97b30;border-radius:12px;color:#43e97b;display:none;margin-top:12px;animation:flashAlert 0.5s ease;}
@keyframes flashAlert{0%,100%{opacity:1;}50%{opacity:.5;}}
</style>
</head>
<body>
<div class="blob b1"></div><div class="blob b2"></div>
<nav>
  <a href="../../index.html" class="btn-back">← Back to Toolzy</a>
  <a href="../../index.html" class="nav-logo">Toolzy</a>
</nav>
<main>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('stopwatch',this)">⏱ Stopwatch</button>
    <button class="tab" onclick="switchTab('timer',this)">⏳ Timer</button>
  </div>

  <!-- STOPWATCH -->
  <div id="tab-stopwatch">
    <div class="card">
      <div class="display-wrap">
        <svg class="svg-ring" width="160" height="160" viewBox="0 0 160 160">
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#00e5ff"/>
              <stop offset="100%" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
          <circle class="ring-bg" cx="80" cy="80" r="68"/>
          <circle class="ring-prog" id="swRing" cx="80" cy="80" r="68" stroke-dasharray="427" stroke-dashoffset="427"/>
        </svg>
        <div class="time-display" id="swDisplay">00:00:00</div>
        <div class="ms-display" id="swMs">.000</div>
      </div>
      <div class="controls">
        <button class="btn-ctrl btn-start" id="swStartBtn" onclick="swToggle()">▶ Start</button>
        <button class="btn-ctrl btn-lap" onclick="addLap()" id="swLapBtn" disabled>◎ Lap</button>
        <button class="btn-ctrl btn-reset" onclick="swReset()">↺ Reset</button>
      </div>
    </div>
    <div class="card" id="lapsCard" style="display:none">
      <div class="sec-title">Laps</div>
      <div class="laps-list" id="lapsList"></div>
    </div>
  </div>

  <!-- TIMER -->
  <div id="tab-timer" style="display:none">
    <div class="card">
      <div class="presets">
        <button class="preset-btn" onclick="setPreset(1,0,0)">1 min</button>
        <button class="preset-btn" onclick="setPreset(3,0,0)">3 min</button>
        <button class="preset-btn" onclick="setPreset(5,0,0)">5 min</button>
        <button class="preset-btn" onclick="setPreset(10,0,0)">10 min</button>
        <button class="preset-btn" onclick="setPreset(15,0,0)">15 min</button>
        <button class="preset-btn" onclick="setPreset(25,0,0)">25 min 🍅</button>
        <button class="preset-btn" onclick="setPreset(30,0,0)">30 min</button>
        <button class="preset-btn" onclick="setPreset(60,0,0)">1 hour</button>
      </div>
      <div class="timer-inputs" id="timerInputs">
        <div class="time-field">
          <input type="number" id="tHr" min="0" max="99" value="0" placeholder="00"/>
          <label>Hours</label>
        </div>
        <span class="time-sep">:</span>
        <div class="time-field">
          <input type="number" id="tMin" min="0" max="59" value="5" placeholder="00"/>
          <label>Minutes</label>
        </div>
        <span class="time-sep">:</span>
        <div class="time-field">
          <input type="number" id="tSec" min="0" max="59" value="0" placeholder="00"/>
          <label>Seconds</label>
        </div>
      </div>
      <div class="display-wrap" id="timerDisplay" style="display:none">
        <svg class="svg-ring" width="160" height="160" viewBox="0 0 160 160">
          <circle class="ring-bg" cx="80" cy="80" r="68"/>
          <circle class="ring-prog" id="tmRing" cx="80" cy="80" r="68" stroke-dasharray="427" stroke-dashoffset="0" style="stroke:url(#ringGrad)"/>
        </svg>
        <div class="time-display" id="tmDisplay">00:00:00</div>
      </div>
      <div class="alert-msg" id="timerAlert">⏰ Time's Up!</div>
      <div class="controls">
        <button class="btn-ctrl btn-start" id="tmStartBtn" onclick="tmToggle()">▶ Start</button>
        <button class="btn-ctrl btn-reset" onclick="tmReset()">↺ Reset</button>
      </div>
    </div>
  </div>
</main>
<script>
// STOPWATCH
let swRunning=false,swStart=0,swElapsed=0,swInterval=null,laps=[],lastLapTime=0;
function fmtTime(ms,showMs=true){
  const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000),ms2=ms%1000;
  const hh=String(h).padStart(2,'0'),mm=String(m).padStart(2,'0'),ss=String(s).padStart(2,'0');
  return showMs?`${hh}:${mm}:${ss}`:`${hh}:${mm}:${ss}`;
}
function swTick(){
  const now=Date.now();
  swElapsed=(now-swStart);
  const tot=swElapsed;
  document.getElementById('swDisplay').textContent=fmtTime(tot);
  document.getElementById('swMs').textContent='.'+String(tot%1000).padStart(3,'0');
  const deg=((tot/1000)%60)/60;
  document.getElementById('swRing').style.strokeDashoffset=427-(427*deg);
}
function swToggle(){
  if(!swRunning){
    swStart=Date.now()-swElapsed;
    swInterval=setInterval(swTick,33);
    swRunning=true;
    document.getElementById('swStartBtn').textContent='⏸ Pause';
    document.getElementById('swStartBtn').className='btn-ctrl btn-stop';
    document.getElementById('swLapBtn').disabled=false;
  } else {
    clearInterval(swInterval);swRunning=false;
    document.getElementById('swStartBtn').textContent='▶ Resume';
    document.getElementById('swStartBtn').className='btn-ctrl btn-start';
  }
}
function swReset(){
  clearInterval(swInterval);swRunning=false;swElapsed=0;laps=[];lastLapTime=0;
  document.getElementById('swDisplay').textContent='00:00:00';
  document.getElementById('swMs').textContent='.000';
  document.getElementById('swRing').style.strokeDashoffset=427;
  document.getElementById('swStartBtn').textContent='▶ Start';
  document.getElementById('swStartBtn').className='btn-ctrl btn-start';
  document.getElementById('swLapBtn').disabled=true;
  document.getElementById('lapsCard').style.display='none';
  document.getElementById('lapsList').innerHTML='';
}
function addLap(){
  const t=swElapsed;
  const delta=t-lastLapTime;lastLapTime=t;
  laps.unshift({n:laps.length+1,t,delta});
  document.getElementById('lapsCard').style.display='block';
  document.getElementById('lapsList').innerHTML=laps.map(l=>`<div class="lap-item"><span class="lap-num">Lap ${l.n}</span><span class="lap-time">${fmtTime(l.t)}.${String(l.t%1000).padStart(3,'0')}</span><span class="lap-delta">+${fmtTime(l.delta)}</span></div>`).join('');
}

// TIMER
let tmRunning=false,tmInterval=null,tmTotal=0,tmRemain=0;
function setPreset(m,s,h){document.getElementById('tHr').value=h;document.getElementById('tMin').value=m;document.getElementById('tSec').value=s;}
function tmToggle(){
  if(!tmRunning){
    if(tmRemain===0){
      const h=parseInt(document.getElementById('tHr').value)||0;
      const m=parseInt(document.getElementById('tMin').value)||0;
      const s=parseInt(document.getElementById('tSec').value)||0;
      tmTotal=(h*3600+m*60+s)*1000;tmRemain=tmTotal;
      if(tmTotal===0) return;
    }
    document.getElementById('timerInputs').style.display='none';
    document.getElementById('timerDisplay').style.display='block';
    document.getElementById('timerAlert').style.display='none';
    const end=Date.now()+tmRemain;
    tmRunning=true;
    document.getElementById('tmStartBtn').textContent='⏸ Pause';
    document.getElementById('tmStartBtn').className='btn-ctrl btn-stop';
    tmInterval=setInterval(()=>{
      tmRemain=Math.max(0,end-Date.now());
      document.getElementById('tmDisplay').textContent=fmtTime(tmRemain);
      const prog=tmTotal>0?1-(tmRemain/tmTotal):0;
      document.getElementById('tmRing').style.strokeDashoffset=427*prog;
      if(tmRemain===0){
        clearInterval(tmInterval);tmRunning=false;
        document.getElementById('timerAlert').style.display='block';
        document.getElementById('tmStartBtn').textContent='▶ Start';
        document.getElementById('tmStartBtn').className='btn-ctrl btn-start';
        try{const a=new AudioContext();const o=a.createOscillator();const g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=880;g.gain.setValueAtTime(0.3,a.currentTime);o.start();o.stop(a.currentTime+0.5);}catch(e){}
      }
    },100);
  } else {
    clearInterval(tmInterval);tmRunning=false;
    document.getElementById('tmStartBtn').textContent='▶ Resume';
    document.getElementById('tmStartBtn').className='btn-ctrl btn-start';
  }
}
function tmReset(){
  clearInterval(tmInterval);tmRunning=false;tmRemain=0;tmTotal=0;
  document.getElementById('timerInputs').style.display='flex';
  document.getElementById('timerDisplay').style.display='none';
  document.getElementById('timerAlert').style.display='none';
  document.getElementById('tmDisplay').textContent='00:00:00';
  document.getElementById('tmRing').style.strokeDashoffset=0;
  document.getElementById('tmStartBtn').textContent='▶ Start';
  document.getElementById('tmStartBtn').className='btn-ctrl btn-start';
}
function switchTab(tab, btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-stopwatch').style.display=tab==='stopwatch'?'block':'none';
  document.getElementById('tab-timer').style.display=tab==='timer'?'block':'none';
}
</script>
</body>
</html>
