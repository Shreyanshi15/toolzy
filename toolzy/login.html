<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login — Toolzy</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
:root{
  --bg:#07080f;--card:#111422;--border:#1c1f35;
  --a1:#00e5ff;--a2:#ff3cac;--a5:#a78bfa;--a4:#43e97b;
  --text:#dde2ff;--muted:#4a5070;--muted2:#6a7090;
  --fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);color:var(--text);
  font-family:var(--fb);min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,229,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,255,.025) 1px,transparent 1px);
  background-size:56px 56px;pointer-events:none;z-index:0;
}
.blob{position:fixed;border-radius:50%;filter:blur(130px);pointer-events:none;z-index:0;}
.b1{width:600px;height:600px;background:#00e5ff;opacity:.07;top:-200px;left:-200px;animation:bd 16s ease-in-out infinite alternate;}
.b2{width:500px;height:500px;background:#ff3cac;opacity:.07;bottom:-150px;right:-150px;animation:bd 20s ease-in-out infinite alternate-reverse;}
.b3{width:350px;height:350px;background:#a78bfa;opacity:.05;top:40%;left:40%;animation:bd 12s ease-in-out infinite alternate;}
@keyframes bd{from{transform:translate(0,0) scale(1);}to{transform:translate(40px,30px) scale(1.1);}}

/* CARD */
.card{
  position:relative;z-index:1;
  background:var(--card);border:1px solid var(--border);
  border-radius:24px;padding:44px 40px;
  width:100%;max-width:400px;
  text-align:center;
  animation:fadeUp .5s ease forwards;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* BACK LINK */
.back{
  position:absolute;top:16px;left:18px;
  color:var(--muted);font-size:.8rem;text-decoration:none;
  display:flex;align-items:center;gap:5px;
  transition:color .2s;
}
.back:hover{color:var(--text);}

/* LOGO */
.logo{
  font-family:var(--fh);font-size:2rem;font-weight:800;letter-spacing:-1px;
  background:linear-gradient(120deg,#00e5ff,#a78bfa 50%,#ff3cac);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:6px;
}
.tagline{font-size:.8rem;color:var(--muted);margin-bottom:0;}

/* ICON */
.icon-wrap{
  width:68px;height:68px;border-radius:50%;
  background:linear-gradient(135deg,#00e5ff12,#a78bfa12);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;margin:22px auto 26px;
}

/* HEADING */
.heading{font-family:var(--fh);font-size:1.25rem;font-weight:700;color:var(--text);margin-bottom:8px;}
.desc{font-size:.82rem;color:var(--muted2);line-height:1.7;margin-bottom:30px;}

/* GOOGLE BTN */
.google-btn{
  width:100%;display:flex;align-items:center;justify-content:center;gap:12px;
  background:#ffffff;border:none;border-radius:100px;
  padding:14px 22px;
  font-family:var(--fb);font-size:.92rem;font-weight:500;color:#1a1a2e;
  cursor:pointer;transition:opacity .2s, transform .15s;
  margin-bottom:20px;
}
.google-btn:hover{opacity:.9;transform:translateY(-1px);}
.google-btn:active{transform:scale(.98);}
.google-btn svg{width:20px;height:20px;flex-shrink:0;}

/* DIVIDER DOTS */
.dots{display:flex;justify-content:center;align-items:center;gap:8px;margin-bottom:20px;}
.dots span{font-size:.75rem;color:var(--muted);}
.dot-line{flex:1;height:1px;background:var(--border);max-width:60px;}

/* FEATURES */
.features{
  display:flex;justify-content:center;gap:18px;
  margin-bottom:24px;flex-wrap:wrap;
}
.feat{
  display:flex;align-items:center;gap:6px;
  font-size:.73rem;color:var(--muted2);
}
.feat-dot{width:6px;height:6px;border-radius:50%;background:var(--a4);}

/* PRIVACY */
.privacy{font-size:.72rem;color:var(--muted);line-height:1.7;}
.privacy a{color:var(--a5);text-decoration:none;}
.privacy a:hover{color:var(--a1);}

/* MSG */
.msg{
  font-size:.8rem;margin-top:16px;min-height:20px;
  padding:8px 14px;border-radius:100px;
  display:none;
}
.msg.success{display:block;background:#43e97b15;color:#43e97b;border:1px solid #43e97b30;}
.msg.error{display:block;background:#ff3cac15;color:#ff3cac;border:1px solid #ff3cac30;}

/* LOADER */
.loader{display:none;width:18px;height:18px;border:2px solid #1a1a2e40;border-top-color:#1a1a2e;border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<div class="card">
  <a class="back" href="index.html">← Back to Toolzy</a>

  <div class="logo">Toolzy</div>
  <div class="tagline">Your free daily tools hub</div>

  <div class="icon-wrap">🔐</div>

  <div class="heading">Welcome!</div>
  <div class="desc">Sign in to save your favorite tools,<br/>game scores &amp; preferences — all free.</div>

  <!-- GOOGLE BUTTON -->
  <button class="google-btn" id="googleBtn" onclick="handleGoogle()">
    <svg viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.3 30.2 0 24 0 14.7 0 6.7 5.4 2.7 13.3l7.8 6C12.4 13 17.8 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.6 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.2-10.1 7.2-17z"/>
      <path fill="#FBBC05" d="M10.5 28.7A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.7 10.7l7.8-6z"/>
      <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.2 0-11.5-4.2-13.4-9.9l-7.8 6C6.7 42.6 14.7 48 24 48z"/>
    </svg>
    <span id="btnText">Continue with Google</span>
    <div class="loader" id="loader"></div>
  </button>

  <!-- FEATURES -->
  <div class="dots">
    <div class="dot-line"></div>
    <span>What you get</span>
    <div class="dot-line"></div>
  </div>

  <div class="features">
    <div class="feat"><div class="feat-dot"></div><span>Save favorites</span></div>
    <div class="feat"><div class="feat-dot"></div><span>Game scores</span></div>
    <div class="feat"><div class="feat-dot"></div><span>Tool history</span></div>
    <div class="feat"><div class="feat-dot"></div><span>100% Free</span></div>
  </div>

  <!-- PRIVACY -->
  <div class="privacy">
    By continuing, you agree to our
    <a href="#">Terms of Service</a> &amp;
    <a href="#">Privacy Policy</a>
  </div>

  <div class="msg" id="msg"></div>
</div>

<script>
  const firebaseConfig = {
    apiKey:            "AIzaSyCHlV6q7fI9_vLmUpQwNofIPs5vXWncEZ8",
    authDomain:        "toolzy-36a4a.firebaseapp.com",
    projectId:         "toolzy-36a4a",
    storageBucket:     "toolzy-36a4a.firebasestorage.app",
    messagingSenderId: "135493269350",
    appId:             "1:135493269350:web:811ac98edf35779931baa7",
    measurementId:     "G-QW1163BJY1"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  /* If already logged in, skip to app */
  auth.onAuthStateChanged(user => {
    if(user){
      localStorage.setItem('toolzy_user', JSON.stringify({
        name:  user.displayName,
        email: user.email,
        photo: user.photoURL
      }));
      window.location.href = 'index.html';
    }
  });

  function handleGoogle(){
    const btn    = document.getElementById('googleBtn');
    const loader = document.getElementById('loader');
    const text   = document.getElementById('btnText');

    btn.disabled  = true;
    loader.style.display = 'block';
    text.textContent     = 'Signing in…';

    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider)
      .then(result => {
        const u = result.user;
        localStorage.setItem('toolzy_user', JSON.stringify({
          name:  u.displayName,
          email: u.email,
          photo: u.photoURL
        }));
        window.location.href = 'index.html';
      })
      .catch(err => {
        btn.disabled  = false;
        loader.style.display = 'none';
        text.textContent     = 'Continue with Google';
        showMsg(
          err.code === 'auth/popup-closed-by-user'
            ? 'Sign-in cancelled. Try again.'
            : 'Sign-in failed: ' + err.message,
          'error'
        );
      });
  }

  function showMsg(text, type){
    const msg = document.getElementById('msg');
    msg.textContent = text;
    msg.className = 'msg ' + type;
  }
</script>

</body>
</html>
